name: CD Pipeline

on:
  workflow_run:
    workflows:
      - "CI/CD Pipeline"
    types:
      - completed

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hostar

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy to EC2 Minikube
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true

          script: |
            echo "===== Connected to EC2 ====="

            cd ~/jio-2026

            echo "===== Updating Repository ====="
            git fetch origin
            git reset --hard origin/main

            echo "===== Logging into Amazon ECR ====="
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com

            echo "===== Applying Kubernetes Manifests ====="
            kubectl apply -f K8S/deployment.yml
            kubectl apply -f K8S/service.yml

            echo "===== Updating Deployment Image ====="
            kubectl set image deployment/hotstar-deployment hotstar=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

            echo "===== Restarting Deployment ====="
            kubectl rollout restart deployment/hotstar-deployment

            echo "===== Waiting for Rollout ====="
            kubectl rollout status deployment/hotstar-deployment --timeout=300s

            echo "===== Deployment Status ====="
            kubectl get deployments

            echo "===== Pods ====="
            kubectl get pods -o wide

            echo "===== Services ====="
            kubectl get svc

            echo "===== Current Image ====="
            kubectl get deployment hotstar-deployment -o=jsonpath='{.spec.template.spec.containers[0].image}'
            echo

            echo "===== Deployment Completed Successfully ====="
